<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="당근카드">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a3a1a">
  <link rel="manifest" href="manifest.json">
  <title>당근 카드뽑기</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
    html,body{width:100%;height:100%;background:#0f2010;overflow:hidden;font-family:'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;touch-action:manipulation;}

    #app{
      width:100vw;height:100dvh;
      display:flex;flex-direction:column;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }

    /* ── Start overlay ── */
    #start-overlay{
      position:fixed;inset:0;z-index:200;
      background:radial-gradient(ellipse at center,#1a3a1a 0%,#0f2010 70%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:18px;cursor:pointer;
    }
    #start-overlay.hidden{display:none;}
    #start-ico{font-size:64px;animation:bounce 1.6s ease-in-out infinite;}
    #start-title{font-size:22px;font-weight:900;color:#66BB6A;letter-spacing:2px;}
    #start-hint{font-size:13px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1px;}
    #start-version{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.32);letter-spacing:1.5px;font-family:ui-monospace,Menlo,Consolas,monospace;}
    #start-tap{
      margin-top:6px;padding:10px 22px;
      background:linear-gradient(135deg,#43A047,#2E7D32);
      color:white;font-size:15px;font-weight:900;letter-spacing:3px;
      border-radius:10px;box-shadow:0 4px 16px rgba(67,160,71,.35);
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes bounce{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    /* ── Portrait rotation fallback (when orientation lock unsupported) ── */
    @media (orientation:portrait){
      body.force-rotate #app{
        position:fixed;top:50%;left:50%;
        width:100dvh;height:100dvw;
        transform:translate(-50%,-50%) rotate(90deg);
        transform-origin:center center;
        /* Anything inside the rotated parent is composited through that GPU rotation,
           so isolate this subtree to avoid invalidations leaking out. */
        will-change:transform;
        contain:layout paint;
      }
    }
    /* Under force-rotate (iOS Safari has no orientation.lock), 3D transforms inside the
       rotated app layer are very expensive — fall back to lighter 2D-only animations. */
    body.force-rotate .c-face,
    body.force-rotate .c-face.travel{
      animation:flipInLite .34s cubic-bezier(.22,1,.36,1) both!important;
    }
    body.force-rotate .shuffling .rf{animation-duration:.85s!important;}
    body.force-rotate .shuffling .rfPress{animation:none!important;}

    /* ── Top bar ── */
    #topbar{
      flex-shrink:0;height:32px;
      display:flex;align-items:center;gap:8px;padding:0 10px;
      background:rgba(0,0,0,0.45);
    }
    #title{font-size:13px;font-weight:900;color:#66BB6A;white-space:nowrap;}
    #prog-wrap{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
    #prog-fill{height:100%;width:100%;transform:scaleX(0);transform-origin:left center;background:linear-gradient(90deg,#43A047,#81C784);border-radius:3px;transition:transform .32s cubic-bezier(.22,1,.36,1);will-change:transform;}
    #count-lbl{font-size:11px;font-weight:800;color:rgba(255,255,255,0.38);white-space:nowrap;}
    #dbg-btn{font-size:15px;cursor:pointer;opacity:0.25;transition:opacity .2s;padding:0 2px;flex-shrink:0;}
    #dbg-btn.on{opacity:1;}

    /* ── Main layout ── */
    #main{
      flex:1;display:flex;align-items:center;justify-content:center;
      gap:clamp(12px,3vw,28px);padding:6px 14px;
    }
    .side{display:flex;flex-direction:column;align-items:center;gap:5px;}
    .side-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,0.22);letter-spacing:2px;}
    .side-hint{font-size:10px;font-weight:700;color:rgba(255,255,255,0.20);height:13px;}

    /* Card slot */
    .card-slot{position:relative;cursor:pointer;flex-shrink:0;transition:transform 90ms ease-out;contain:layout style;}
    #deck-slot{transform:translateZ(0);}
    #deck-slot:active{transform:scale(.955) translate3d(0,2px,0);}
    /* deck-low: cheap radial-gradient glow + opacity-only pulse (was a heavy box-shadow blur).
       Radial gradient is rasterized once into the layer; only opacity animates → composite-only. */
    #deck-slot.deck-low::after{
      content:"";position:absolute;inset:-12px;border-radius:20px;pointer-events:none;
      background:radial-gradient(closest-side,rgba(239,83,80,.42),rgba(239,83,80,0) 72%);
      opacity:.55;animation:lowPulse 1.6s ease-in-out infinite;
    }
    #deck-slot.shuffling{pointer-events:none;}

    /* Stack ghost layers */
    .sl3,.sl2{position:absolute;border-radius:13px;pointer-events:none;}
    .sl3{top:-6px;left:3px;background:rgba(165,214,167,.55);}
    .sl2{top:-3px;left:1.5px;background:rgba(200,230,201,.7);}

    /* Riffle layers (used during shuffle) */
    .rf{position:absolute;inset:0;border-radius:13px;border:2.5px solid #66BB6A;
        background:linear-gradient(135deg,#C8E6C9,#81C784);will-change:transform,opacity;}
    .shuffling .rf{animation-duration:1.1s;animation-timing-function:cubic-bezier(.4,0,.2,1);animation-fill-mode:forwards;}
    .shuffling .rfL1{animation-name:riffleL;animation-delay:0ms;}
    .shuffling .rfL2{animation-name:riffleL;animation-delay:80ms;}
    .shuffling .rfL3{animation-name:riffleL;animation-delay:160ms;}
    .shuffling .rfR1{animation-name:riffleR;animation-delay:40ms;}
    .shuffling .rfR2{animation-name:riffleR;animation-delay:120ms;}
    .shuffling .rfR3{animation-name:riffleR;animation-delay:200ms;}
    .shuffling .rfPress{animation:rifflePress 1.4s cubic-bezier(.4,0,.2,1) forwards;}

    /* Card back */
    .c-back{
      position:absolute;inset:0;border-radius:13px;
      background:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56' viewBox='0 0 56 56'><g fill='%232E7D32' fill-opacity='0.20'><ellipse cx='10' cy='12' rx='2' ry='5'/><ellipse cx='15' cy='12' rx='2' ry='5'/><circle cx='12.5' cy='19' r='4.5'/></g><path d='M36,36 L42,36 L39,48 Z' fill='%23FF7043' fill-opacity='0.32'/><path d='M36,36 L37.5,32 L39,36 L40.5,32 L42,36 Z' fill='%232E7D32' fill-opacity='0.32'/></svg>") repeat,
        linear-gradient(145deg,#E8F5E9,#C8E6C9,#A5D6A7);
      background-size:56px 56px,auto;
      border:2.5px solid #66BB6A;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      transform:translateZ(0);
    }
    .c-back-ring{position:absolute;inset:8px;border:1.5px solid rgba(76,175,80,.35);border-radius:8px;}
    .c-back-ico{font-size:32px;z-index:1;}
    .c-back-row{display:flex;align-items:center;gap:5px;z-index:1;margin-top:4px;}
    .c-back-mini{font-size:11px;}
    .c-back-txt{font-size:7px;color:rgba(46,125,50,.7);letter-spacing:2px;z-index:1;font-weight:800;}

    /* Empty/shuffle */
    .c-empty{
      position:absolute;inset:0;border-radius:13px;
      background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.15);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    }
    .c-empty-ico{font-size:28px;}
    .c-empty-txt{font-size:11px;font-weight:800;color:rgba(255,255,255,.32);}

    /* Drawn placeholder */
    .c-ph{
      position:absolute;inset:0;border-radius:13px;
      background:rgba(255,255,255,.02);border:2px dashed rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:center;
    }
    .c-ph-txt{font-size:10px;color:rgba(255,255,255,.15);font-weight:700;}

    /* Card face. Animation is class-driven so force-rotate can override cleanly.
       Parent holds the perspective so keyframes only animate transform/scale —
       lets Android Chrome run cardTravel/flipIn as a compositor-only animation. */
    .c-face{
      position:absolute;inset:0;border-radius:13px;border:2.5px solid;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      overflow:hidden;animation:flipIn .46s cubic-bezier(.22,1,.36,1);
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      transform:translateZ(0);
      perspective:600px;-webkit-perspective:600px;
    }
    .c-face.travel{animation:cardTravel .52s cubic-bezier(.22,1,.36,1) both;will-change:transform;}
    .c-badge{
      position:absolute;top:6px;left:6px;
      font-size:8px;font-weight:900;
      padding:2px 6px;border-radius:4px;color:white;
    }
    /* drop-shadow filter was forcing per-frame paint of the moving emoji during
       cardTravel on Android Chrome — drop it. The card border + gradient already
       give the emoji enough visual contrast. */
    .c-emoji{z-index:1;}
    .c-dots{display:flex;gap:4px;margin-top:7px;z-index:1;}
    .dot{width:14px;height:10px;border-radius:50%;background:linear-gradient(135deg,#FFE57F,#FFD600);border:1.5px solid #F9A825;}
    .c-click{
      margin-top:7px;background:#1a1a1a;color:white;
      padding:3px 10px;border-radius:4px;
      font-size:11px;font-weight:900;letter-spacing:2px;
    }
    .cloud{position:absolute;background:rgba(255,255,255,.88);border-radius:20px;}

    /* Deck badge */
    .deck-badge{
      position:absolute;top:-9px;right:-9px;z-index:10;
      background:#ef5350;color:white;
      width:24px;height:24px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:900;
      border:2px solid #0f2010;
      box-shadow:0 2px 8px rgba(239,83,80,.5);
      overflow:hidden;
    }
    .deck-badge .num{display:inline-block;}
    .deck-badge.changing .num{animation:countSlide .26s cubic-bezier(.22,1,.36,1);}
    .deck-badge.popping{animation:badgePop .42s cubic-bezier(.34,1.56,.64,1);}

    /* Arrow */
    #arrow{font-size:18px;color:rgba(255,255,255,.18);flex-shrink:0;}

    /* Drawn label */
    #drawn-lbl{font-size:14px;font-weight:900;min-height:18px;}

    /* ── Debug panel ── */
    #dbg-panel{
      position:fixed;left:0;right:0;bottom:-220px;
      background:rgba(4,10,4,.97);
      border-top:1px solid rgba(255,255,255,.07);
      padding:12px 14px 14px;
      transition:bottom .3s cubic-bezier(.4,0,.2,1);
      z-index:100;backdrop-filter:blur(14px);
      padding-bottom:calc(12px + env(safe-area-inset-bottom));
    }
    #dbg-panel.open{bottom:0;}
    #dbg-panel h3{font-size:8px;color:rgba(255,255,255,.18);text-align:center;letter-spacing:3px;margin-bottom:10px;}
    #dbg-perf{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;font-weight:700;color:rgba(255,255,255,.55);text-align:center;margin-bottom:8px;letter-spacing:.5px;}
    #dbg-perf .ok{color:#81C784;}
    #dbg-perf .warn{color:#FFB74D;}
    #dbg-perf .bad{color:#EF5350;}
    .dbg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
    .dbg-card{border-radius:8px;padding:6px 9px;border:1px solid;}
    .dbg-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .dbg-lbl{font-size:11px;font-weight:800;}
    .dbg-cnt{font-size:12px;font-weight:900;}
    .dbg-bar{height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
    .dbg-bar-fill{height:100%;border-radius:2px;transition:width .3s;}
    .dbg-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
    .dbg-chip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;border:1.5px solid;}
    .dbg-close{
      display:block;width:100%;margin-top:10px;padding:5px;
      background:rgba(255,255,255,.05);border:none;border-radius:6px;
      color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;
    }

    /* ── Animations ── */
    /* perspective lives on the parent .c-face — keyframes only touch transform/scale
       so the compositor can keep this off the main thread. */
    @keyframes flipIn{
      0%{transform:rotateY(90deg) scale(.88);opacity:0;}
      55%{transform:rotateY(-4deg) scale(1.02);opacity:1;}
      100%{transform:rotateY(0) scale(1);opacity:1;}
    }
    /* 2D-only fallback used inside force-rotate parent (cheaper to composite through rotation) */
    @keyframes flipInLite{
      0%  {opacity:0;transform:scale(.86) translateZ(0);}
      60% {opacity:1;transform:scale(1.04) translateZ(0);}
      100%{opacity:1;transform:scale(1)  translateZ(0);}
    }
    /* Card travels from deck → drawn slot, with rotation + arc + overshoot */
    @keyframes cardTravel{
      0%  {transform:translate3d(var(--tx),-8px,0) rotateY(75deg) scale(.9);opacity:0;}
      35% {transform:translate3d(calc(var(--tx) * .55),-14px,0) rotateY(28deg) scale(.97);opacity:1;}
      70% {transform:translate3d(calc(var(--tx) * .15),-4px,0) rotateY(-6deg) scale(1.03);opacity:1;}
      100%{transform:translate3d(0,0,0) rotateY(0) scale(1);opacity:1;}
    }
    @keyframes deckLift{
      0%  {transform:translate3d(0,0,0);}
      40% {transform:translate3d(0,-6px,0);}
      100%{transform:translate3d(0,0,0);}
    }
    @keyframes lPop{
      0%{transform:scale(.4);opacity:0;}
      65%{transform:scale(1.12);opacity:1;}
      100%{transform:scale(1);opacity:1;}
    }
    @keyframes pulse{0%,100%{opacity:.65;}50%{opacity:1;}}
    @keyframes lowPulse{
      0%,100%{opacity:.32;}
      50%   {opacity:.7;}
    }
    @keyframes countSlide{
      0%  {transform:translate3d(0,-110%,0);opacity:0;}
      60% {transform:translate3d(0,4%,0);opacity:1;}
      100%{transform:translate3d(0,0,0);opacity:1;}
    }
    @keyframes badgePop{
      0%  {transform:scale(.2);opacity:0;}
      55% {transform:scale(1.25);opacity:1;}
      100%{transform:scale(1);opacity:1;}
    }
    /* Riffle shuffle: left/right halves split, weave back together */
    @keyframes riffleL{
      0%  {transform:translate(0,0) rotate(0);opacity:.95;}
      30% {transform:translate(-58px,-6px) rotate(-14deg);opacity:1;}
      55% {transform:translate(-44px,-2px) rotate(-9deg);opacity:1;}
      78% {transform:translate(-8px,0) rotate(-2deg);opacity:1;}
      100%{transform:translate(0,0) rotate(0);opacity:.85;}
    }
    @keyframes riffleR{
      0%  {transform:translate(0,0) rotate(0);opacity:.95;}
      30% {transform:translate(58px,-6px) rotate(14deg);opacity:1;}
      55% {transform:translate(44px,-2px) rotate(9deg);opacity:1;}
      78% {transform:translate(8px,0) rotate(2deg);opacity:1;}
      100%{transform:translate(0,0) rotate(0);opacity:.85;}
    }
    @keyframes rifflePress{
      0%  {transform:scale(1) translateY(0);}
      14% {transform:scale(.96) translateY(3px);}
      72% {transform:scale(1) translateY(0);}
      86% {transform:scale(1.04) translateY(-4px);}
      100%{transform:scale(1) translateY(0);}
    }
    .pulsing{animation:pulse 1.8s ease-in-out infinite;}

    @media (prefers-reduced-motion:reduce){
      .c-face{animation-duration:.01ms!important;}
      .shuffling .rf{animation-duration:.01ms!important;}
      #deck-slot.deck-low::after{animation:none!important;}
      .pulsing,#start-ico,#start-tap{animation:none!important;}
    }
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="title">🥕 당근카드</div>
    <div id="prog-wrap"><div id="prog-fill"></div></div>
    <div id="count-lbl">0 / 24</div>
    <div id="dbg-btn" onclick="toggleDebug()">🐛</div>
  </div>
  <div id="main">
    <div class="side">
      <div class="side-lbl">DECK</div>
      <div class="card-slot" id="deck-slot" role="button" tabindex="0"
           aria-label="카드 뽑기" onclick="draw()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();draw();}"></div>
      <div class="side-hint" id="deck-hint">탭하여 뽑기</div>
    </div>
    <div id="arrow" aria-hidden="true">▶</div>
    <div class="side">
      <div class="side-lbl">DRAWN</div>
      <div class="card-slot" id="drawn-slot" aria-live="polite"></div>
      <div id="drawn-lbl" aria-hidden="true"></div>
    </div>
  </div>
</div>

<div id="dbg-panel">
  <h3>◈ DEBUG MODE ◈</h3>
  <div id="dbg-perf">FPS — · worst — · long task —</div>
  <div class="dbg-grid" id="dbg-stats"></div>
  <div class="dbg-chips" id="dbg-chips"></div>
  <button class="dbg-close" onclick="toggleDebug()">▲ 닫기</button>
</div>

<div id="start-overlay" onclick="startApp()">
  <div id="start-ico">🥕</div>
  <div id="start-title">당근 카드뽑기</div>
  <div id="start-tap">탭하여 시작</div>
  <div id="start-hint">전체화면 · 가로모드</div>
  <div id="start-version">v2026.05.04.3</div>
</div>

<script>
const INFO = {
  carrot:{ label:'당근!', emoji:'🥕', color:'#BF360C', border:'#FF6D00' },
  '1':   { label:'1칸',  emoji:'🐇', color:'#1B5E20', border:'#43A047', dots:1 },
  '2':   { label:'2칸',  emoji:'🐇', color:'#0D47A1', border:'#1E88E5', dots:2 },
  '3':   { label:'3칸',  emoji:'🐇', color:'#4A148C', border:'#8E24AA', dots:3 },
};
const TOTALS = { carrot:6, '1':12, '2':4, '3':2 };
const TEMPLATE = [
  ...Array(6).fill('carrot'),
  ...Array(12).fill('1'),
  ...Array(4).fill('2'),
  ...Array(2).fill('3'),
];

let deck=[], drawn=null, counts={}, chips=[], phase='idle', debugOpen=false;
let CW=130, CH=190;
// Cached deck → drawn translate offset, refreshed only on layout changes
// (calcCardSize). Avoids a forced sync layout on every draw.
let TRAVEL_TX=0;
let audioCtx=null;

function initAudio(){
  if(audioCtx) return;
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx) return;
  try{ audioCtx=new Ctx(); }catch(_){}
}
function playFlipSound(){
  if(!audioCtx) initAudio();
  if(!audioCtx) return;
  if(audioCtx.state==='suspended'){ audioCtx.resume().catch(()=>{}); }
  const t=audioCtx.currentTime;

  // Layer A: filtered noise "whoosh"
  const dur=0.12;
  const buf=audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*dur), audioCtx.sampleRate);
  const ch=buf.getChannelData(0);
  for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1);
  const noise=audioCtx.createBufferSource(); noise.buffer=buf;
  const filt=audioCtx.createBiquadFilter();
  filt.type='bandpass'; filt.Q.value=1.2;
  filt.frequency.setValueAtTime(800,t);
  filt.frequency.exponentialRampToValueAtTime(1800,t+0.09);
  const ng=audioCtx.createGain();
  ng.gain.setValueAtTime(0.0001,t);
  ng.gain.exponentialRampToValueAtTime(0.18,t+0.012);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
  noise.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination);
  noise.start(t); noise.stop(t+dur);

  // Layer B: short pitch "snap"
  const osc=audioCtx.createOscillator();
  osc.type='triangle';
  osc.frequency.setValueAtTime(1500,t+0.04);
  osc.frequency.exponentialRampToValueAtTime(500,t+0.1);
  const og=audioCtx.createGain();
  og.gain.setValueAtTime(0.0001,t+0.04);
  og.gain.exponentialRampToValueAtTime(0.08,t+0.05);
  og.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
  osc.connect(og); og.connect(audioCtx.destination);
  osc.start(t+0.04); osc.stop(t+0.11);
}

// Layered "riffle" shuffle sound: 4 short noise bursts with stagger
// + a final low-pitched "tap" when the deck settles.
function playShuffleSound(){
  if(!audioCtx) initAudio();
  if(!audioCtx) return;
  if(audioCtx.state==='suspended'){ audioCtx.resume().catch(()=>{}); }
  const t0=audioCtx.currentTime;
  const burst=(when,centerHz,dur,gain)=>{
    const buf=audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*dur), audioCtx.sampleRate);
    const ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const filt=audioCtx.createBiquadFilter();
    filt.type='bandpass'; filt.Q.value=1.6;
    filt.frequency.setValueAtTime(centerHz,t0+when);
    filt.frequency.exponentialRampToValueAtTime(centerHz*1.6,t0+when+dur*0.7);
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0.0001,t0+when);
    g.gain.exponentialRampToValueAtTime(gain,t0+when+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+when+dur);
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t0+when); src.stop(t0+when+dur);
  };
  // 4 staggered "shf" bursts
  burst(0.00, 900, 0.10, 0.14);
  burst(0.13, 1100, 0.10, 0.13);
  burst(0.28, 1000, 0.10, 0.13);
  burst(0.46, 1200, 0.09, 0.12);
  // Final settle "tap"
  const osc=audioCtx.createOscillator();
  osc.type='sine';
  osc.frequency.setValueAtTime(220, t0+0.95);
  osc.frequency.exponentialRampToValueAtTime(120, t0+1.05);
  const og=audioCtx.createGain();
  og.gain.setValueAtTime(0.0001, t0+0.95);
  og.gain.exponentialRampToValueAtTime(0.10, t0+0.97);
  og.gain.exponentialRampToValueAtTime(0.0001, t0+1.10);
  osc.connect(og); og.connect(audioCtx.destination);
  osc.start(t0+0.95); osc.stop(t0+1.12);
}

function vibrate(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(_){}
}

function shuffle(a){
  a=[...a];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function makeDeck(){
  const ts=Date.now();
  return shuffle(TEMPLATE.map((t,i)=>({type:t,uid:`${t}${ts}${i}`})));
}

function calcCardSize(){
  const main=document.getElementById('main');
  const r=main.getBoundingClientRect();
  const avH=r.height-44;
  CH=Math.min(Math.max(avH,120),300);
  CW=Math.round(CH*0.62);
  const deckEl=document.getElementById('deck-slot');
  const drawnEl=document.getElementById('drawn-slot');
  [deckEl,drawnEl].forEach(el=>{ el.style.width=CW+'px'; el.style.height=CH+'px'; });
  // update ghost layer sizes
  document.querySelectorAll('.sl3,.sl2').forEach(el=>{
    el.style.width=CW+'px'; el.style.height=CH+'px';
  });
  // Slot positions are stable until the next layout pass — cache the deck→drawn
  // delta now so renderDrawn() doesn't have to call getBoundingClientRect on every
  // draw (each call was forcing a synchronous layout flush mid-paint).
  if(!document.body.classList.contains('force-rotate')){
    const dr=deckEl.getBoundingClientRect();
    const dw=drawnEl.getBoundingClientRect();
    TRAVEL_TX=Math.round(dr.left - dw.left);
  } else {
    TRAVEL_TX=0;
  }
}

function renderDeck(opts){
  opts = opts || {};
  const slot=document.getElementById('deck-slot');
  const hint=document.getElementById('deck-hint');
  const empty=deck.length===0;
  let html='';

  if(!empty){
    const sl3Vis = deck.length>2 ? '' : 'visibility:hidden;';
    const sl2Vis = deck.length>1 ? '' : 'visibility:hidden;';
    html+=`<div class="sl3" style="width:${CW}px;height:${CH}px;${sl3Vis}"></div>`;
    html+=`<div class="sl2" style="width:${CW}px;height:${CH}px;${sl2Vis}"></div>`;
  }

  if(phase==='shuffling'){
    // 6 layered riffle cards (3 left half, 3 right half) + a press wrapper for compress/settle.
    html+=`<div class="rf rfPress" style="z-index:0;background:linear-gradient(135deg,#A5D6A7,#66BB6A);"></div>`;
    ['rfL1','rfL2','rfL3','rfR1','rfR2','rfR3'].forEach((c,i)=>{
      const bg = i<3
        ? 'linear-gradient(115deg,#E8F5E9,#A5D6A7)'
        : 'linear-gradient(245deg,#E8F5E9,#A5D6A7)';
      html+=`<div class="rf ${c}" style="z-index:${i+1};background:${bg};"></div>`;
    });
    slot.classList.add('shuffling');
  } else {
    slot.classList.remove('shuffling');
  }

  // Tension cue: last 5 cards
  slot.classList.toggle('deck-low', !empty && deck.length<=5 && phase!=='shuffling');

  if(empty){
    hint.textContent= phase==='shuffling' ? '셔플 중...' : '탭하여 셔플';
    if(phase!=='shuffling') slot.classList.add('pulsing'); else slot.classList.remove('pulsing');
    if(phase!=='shuffling'){
      const txt='탭하여 셔플!';
      html+=`<div class="c-empty"><div class="c-empty-ico">🔀</div><div class="c-empty-txt">${txt}</div></div>`;
    }
  } else {
    hint.textContent='탭하여 뽑기';
    slot.classList.remove('pulsing');
    html+=`<div class="c-back"><div class="c-back-ring"></div><div class="c-back-ico">🐰</div><div class="c-back-row"><span class="c-back-mini">🥕</span><span class="c-back-txt">CARROT</span><span class="c-back-mini">🥕</span></div></div>`;
    const badgeCls = opts.badgePop ? 'deck-badge popping' : (opts.countChanged ? 'deck-badge changing' : 'deck-badge');
    html+=`<div class="${badgeCls}"><span class="num">${deck.length}</span></div>`;
  }
  slot.innerHTML=html;

  // Update aria label so screen readers announce remaining count
  if(empty){
    slot.setAttribute('aria-label', phase==='shuffling' ? '셔플 진행 중' : '덱이 비었습니다. 탭하여 셔플');
  } else {
    slot.setAttribute('aria-label', `카드 뽑기, 남은 ${deck.length}장`);
  }
}

// Lightweight update path: only mutates the badge count and ghost-layer visibility,
// so the card-back DOM stays put and animations don't get stomped by an innerHTML rebuild.
// Uses Web Animations API for the count slide / pop so we no longer trigger a synchronous
// `void offsetWidth` reflow on every draw (was causing visible micro-stutters).
function updateDeckCount(opts){
  opts = opts || {};
  const slot=document.getElementById('deck-slot');
  const badge=slot.querySelector('.deck-badge');
  if(!badge){ renderDeck(opts); return; }
  const numEl=badge.querySelector('.num');

  numEl.textContent=deck.length;

  if(numEl.animate){
    if(opts.badgePop){
      badge.getAnimations().forEach(a=>a.cancel());
      badge.animate(
        [
          {transform:'scale(.2)',opacity:0},
          {transform:'scale(1.25)',opacity:1,offset:.55},
          {transform:'scale(1)',opacity:1}
        ],
        {duration:420,easing:'cubic-bezier(.34,1.56,.64,1)'}
      );
    } else if(opts.countChanged){
      numEl.getAnimations().forEach(a=>a.cancel());
      numEl.animate(
        [
          {transform:'translate3d(0,-110%,0)',opacity:0},
          {transform:'translate3d(0,4%,0)',opacity:1,offset:.6},
          {transform:'translate3d(0,0,0)',opacity:1}
        ],
        {duration:260,easing:'cubic-bezier(.22,1,.36,1)'}
      );
    }
  } else {
    // Legacy fallback (browsers without Element.animate)
    badge.classList.remove('changing','popping');
    void numEl.offsetWidth;
    if(opts.badgePop) badge.classList.add('popping');
    else if(opts.countChanged) badge.classList.add('changing');
  }

  const sl3=slot.querySelector('.sl3');
  const sl2=slot.querySelector('.sl2');
  if(sl3) sl3.style.visibility = deck.length>2 ? '' : 'hidden';
  if(sl2) sl2.style.visibility = deck.length>1 ? '' : 'hidden';

  slot.classList.toggle('deck-low', deck.length>0 && deck.length<=5 && phase!=='shuffling');
  slot.setAttribute('aria-label', `카드 뽑기, 남은 ${deck.length}장`);
}

function renderDrawn(opts){
  opts = opts || {};
  const slot=document.getElementById('drawn-slot');
  const lbl=document.getElementById('drawn-lbl');
  if(!drawn){
    slot.innerHTML=`<div class="c-ph"><div class="c-ph-txt">여기에 표시</div></div>`;
    lbl.textContent=''; lbl.style.animation='';
    return;
  }
  const info=INFO[drawn.type];
  const isC=drawn.type==='carrot';
  const es=Math.round(CH*0.28);
  const bg=isC?'white':'linear-gradient(to bottom,#87CEEB 0%,#87CEEB 62%,#4CAF50 62%,#3d9444 100%)';

  let clouds='';
  if(!isC){
    const cw1=Math.round(CW*.28), cw2=Math.round(CW*.19), cw3=Math.round(CW*.22);
    clouds=`
      <div class="cloud" style="top:9px;left:9px;width:${cw1}px;height:14px"></div>
      <div class="cloud" style="top:6px;left:${Math.round(CW*.18)}px;width:${cw2}px;height:12px"></div>
      <div class="cloud" style="top:11px;right:10px;width:${cw3}px;height:13px"></div>`;
  }

  let inner='';
  if(isC){
    inner=`<div class="c-emoji" style="font-size:${es}px;transform:rotate(-8deg)">${info.emoji}</div>
           <div class="c-click">CLICK!</div>`;
  } else {
    const ds=Array(info.dots).fill('<div class="dot"></div>').join('');
    inner=`<div class="c-emoji" style="font-size:${es}px">${info.emoji}</div>
           <div class="c-dots">${ds}</div>`;
  }

  // Card travels from deck slot → drawn slot in landscape. In force-rotate (iOS portrait
  // fallback), skip the cardTravel animation entirely — perspective+rotateY composited
  // through the rotated parent is the main cause of jank there.
  // Note: TRAVEL_TX is cached in calcCardSize() so we no longer trigger a synchronous
  // layout flush on every draw.
  let txStyle = '';
  let cls = 'c-face';
  const inForceRotate = document.body.classList.contains('force-rotate');
  if(opts.travel && !inForceRotate){
    txStyle = `--tx:${TRAVEL_TX}px;`;
    cls = 'c-face travel';
  }

  slot.innerHTML=`<div class="${cls}" style="${txStyle}background:${bg};border-color:${info.border}">
    ${clouds}
    <div class="c-badge" style="background:${info.border}">${info.label}</div>
    ${inner}
  </div>`;

  // Release the GPU layer for .c-face.travel as soon as the animation finishes —
  // will-change: transform is only useful while the transform is animating.
  if(opts.travel && !inForceRotate){
    const faceEl=slot.firstElementChild;
    if(faceEl){
      faceEl.addEventListener('animationend',()=>{ faceEl.style.willChange='auto'; },{once:true});
    }
  }

  lbl.textContent=info.label;
  lbl.style.color=info.color;
  lbl.style.animation='none';
  requestAnimationFrame(()=>{ lbl.style.animation='lPop .38s cubic-bezier(.22,1,.36,1)'; });
}

function updateBar(){
  const n=Object.values(counts).reduce((s,v)=>s+v,0);
  document.getElementById('prog-fill').style.transform=`scaleX(${n/24})`;
  document.getElementById('count-lbl').textContent=`${n} / 24`;
}

function renderDebug(){
  const statsEl=document.getElementById('dbg-stats');
  const chipsEl=document.getElementById('dbg-chips');
  statsEl.innerHTML=Object.entries(INFO).map(([type,info])=>{
    const cnt=counts[type]||0, tot=TOTALS[type], pct=(cnt/tot)*100;
    return `<div class="dbg-card" style="background:${info.border}12;border-color:${info.border}33">
      <div class="dbg-row">
        <span class="dbg-lbl" style="color:${info.color}">${info.emoji} ${info.label}</span>
        <span class="dbg-cnt" style="color:${info.color}">${cnt}<span style="font-size:9px;color:rgba(255,255,255,.22);font-weight:700">/${tot}</span></span>
      </div>
      <div class="dbg-bar"><div class="dbg-bar-fill" style="width:${pct}%;background:${info.border}"></div></div>
    </div>`;
  }).join('');
  chipsEl.innerHTML=chips.map((card,i)=>{
    const info=INFO[card.type];
    return `<div class="dbg-chip" style="background:${info.border}1A;border-color:${info.border};color:${info.color};opacity:${Math.max(.28,1-i*.1)}">${info.emoji} ${info.label}</div>`;
  }).join('');
}

function draw(){
  if(phase!=='idle') return;
  if(deck.length===0){
    // Shuffle flow: compress → riffle → settle → reveal
    phase='shuffling';
    // Defer audio synthesis off the gesture's critical paint path (the noise-buffer
    // generation loop is ~17K samples and was delaying the first animation frame).
    setTimeout(playShuffleSound,0);
    vibrate([30,60,30,60,40]);
    renderDeck();
    setTimeout(()=>{
      // After the riffle finishes, regenerate the deck and pop the count badge in.
      deck=makeDeck(); drawn=null; counts={}; chips=[];
      renderDrawn(); updateBar();
      phase='idle';
      renderDeck({badgePop:true});
      if(debugOpen) renderDebug();
    }, 1400);
    return;
  }
  phase='flipping';
  // Defer audio so the tap-to-paint latency stays minimal.
  setTimeout(playFlipSound,0);
  vibrate(8);
  const card=deck.pop();
  drawn=card;
  counts[card.type]=(counts[card.type]||0)+1;
  chips.unshift(card); if(chips.length>10) chips.length=10;
  // Render drawn card BEFORE deck so geometry (deck still on screen) is correct for travel anim.
  renderDrawn({travel:true});
  // Use lightweight count update so the card-back DOM (and its paint) stays put.
  // Only do a full re-render when we actually need to switch into the empty/shuffle state.
  if(deck.length===0) renderDeck({countChanged:true});
  else updateDeckCount({countChanged:true});
  updateBar();
  // Subtle lift on the deck the moment a card is pulled away. Web Animations API
  // avoids the `void offsetWidth` forced reflow that used to interrupt the compositor.
  const deckEl=document.getElementById('deck-slot');
  if(deckEl.animate){
    deckEl.getAnimations({subtree:false}).forEach(a=>{
      if(a.id==='deckLift') a.cancel();
    });
    const a=deckEl.animate(
      [
        {transform:'translate3d(0,0,0)'},
        {transform:'translate3d(0,-6px,0)',offset:.4},
        {transform:'translate3d(0,0,0)'}
      ],
      {duration:380,easing:'cubic-bezier(.4,0,.2,1)'}
    );
    a.id='deckLift';
  }
  if(debugOpen) renderDebug();
  setTimeout(()=>{ phase='idle'; },420);
}

// ── Frame / long-task monitor (only runs while the debug panel is open). ──
// rAF accumulates frame deltas over ~1s windows; PerformanceObserver counts
// long tasks (>50ms blocks on the main thread). Both are zero-cost when off.
let perfRafId=0, perfWindowStart=0, perfFrames=0, perfWorst=0, perfLongtaskCount=0, perfLastTs=0;
let perfObs=null;
function perfTick(ts){
  if(!debugOpen) return;
  if(perfLastTs){
    const dt=ts-perfLastTs;
    if(dt>perfWorst) perfWorst=dt;
    perfFrames++;
  }
  perfLastTs=ts;
  if(!perfWindowStart) perfWindowStart=ts;
  if(ts-perfWindowStart>=1000){
    const fps=Math.round(perfFrames*1000/(ts-perfWindowStart));
    const worst=perfWorst.toFixed(1);
    const fpsCls = fps>=58 ? 'ok' : fps>=45 ? 'warn' : 'bad';
    const wCls   = perfWorst<=18 ? 'ok' : perfWorst<=33 ? 'warn' : 'bad';
    const ltCls  = perfLongtaskCount===0 ? 'ok' : perfLongtaskCount<3 ? 'warn' : 'bad';
    const el=document.getElementById('dbg-perf');
    if(el){
      el.innerHTML =
        `FPS <span class="${fpsCls}">${fps}</span> · `+
        `worst <span class="${wCls}">${worst}ms</span> · `+
        `long task <span class="${ltCls}">${perfLongtaskCount}</span>`;
    }
    perfWindowStart=ts; perfFrames=0; perfWorst=0;
  }
  perfRafId=requestAnimationFrame(perfTick);
}
function startPerfMonitor(){
  if(perfRafId) return;
  perfWindowStart=0; perfFrames=0; perfWorst=0; perfLongtaskCount=0; perfLastTs=0;
  perfRafId=requestAnimationFrame(perfTick);
  if('PerformanceObserver' in window && !perfObs){
    try{
      perfObs=new PerformanceObserver(list=>{ perfLongtaskCount+=list.getEntries().length; });
      perfObs.observe({type:'longtask',buffered:false});
    }catch(_){ perfObs=null; }
  } else if(perfObs){
    try{ perfObs.observe({type:'longtask',buffered:false}); }catch(_){}
  }
}
function stopPerfMonitor(){
  if(perfRafId){ cancelAnimationFrame(perfRafId); perfRafId=0; }
  if(perfObs){ try{ perfObs.disconnect(); }catch(_){} }
}

function toggleDebug(){
  debugOpen=!debugOpen;
  document.getElementById('dbg-panel').classList.toggle('open',debugOpen);
  document.getElementById('dbg-btn').classList.toggle('on',debugOpen);
  if(debugOpen){ renderDebug(); startPerfMonitor(); }
  else stopPerfMonitor();
}

function init(){
  deck=makeDeck(); drawn=null; counts={}; chips=[]; phase='idle';
  calcCardSize(); renderDeck(); renderDrawn(); updateBar();
}

async function enterFullscreen(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req){
    try{ await req.call(el,{navigationUI:'hide'}); }catch(_){}
  }
}

async function lockLandscape(){
  try{
    if(screen.orientation&&screen.orientation.lock){
      await screen.orientation.lock('landscape');
      return true;
    }
  }catch(_){}
  return false;
}

async function startApp(){
  const overlay=document.getElementById('start-overlay');
  initAudio();
  await enterFullscreen();
  const locked=await lockLandscape();
  if(!locked) document.body.classList.add('force-rotate');
  overlay.classList.add('hidden');
  setTimeout(()=>{ calcCardSize(); renderDeck(); renderDrawn(); },120);
}

window.addEventListener('resize',()=>{ calcCardSize(); renderDeck(); renderDrawn(); });
window.addEventListener('orientationchange',()=>{ setTimeout(()=>{ calcCardSize(); renderDeck(); renderDrawn(); },200); });

// Re-show start overlay if user exits fullscreen
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement){
    document.getElementById('start-overlay').classList.remove('hidden');
  }
});

// SW registration — reload once when a new worker takes control so the
// freshly-deployed index.html is rendered instead of the cached one.
if('serviceWorker' in navigator){
  let reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloading) return;
    reloading=true;
    location.reload();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      reg.update().catch(()=>{});
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            nw.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
    }).catch(()=>{});
  });
}

init();
</script>
